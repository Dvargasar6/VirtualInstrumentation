; PlatformIO project configuration
; Docs: https://docs.platformio.org/en/latest/projectconf/

[env:esp32dev]
platform = espressif32        ; Espressif toolchain and SDK
board = esp32dev              ; Generic ESP32 DevKit (38-pin)
framework = arduino           ; Arduino core for ESP32

monitor_speed = 115200        ; Baud rate for 'pio device monitor'
upload_speed = 921600         ; Faster flashing; lower to 115200 if it fails

; Third-party libraries resolved automatically by PlatformIO
lib_deps =
    bblanchon/ArduinoJson@^7.0.0   ; JSON serialization/parsing for the serial protocol
