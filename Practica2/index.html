<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Practica 2 - Control PID</title>
<!--
  Chart.js cargado desde CDN. Version 4.x. No requiere instalacion local;
  el navegador lo descarga la primera vez y lo cachea. Si necesita trabajar
  sin internet, descargue chart.umd.js y referencielo localmente.
-->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<div id="app">

  <!-- ============================================================ -->
  <!--   Panel izquierdo: controles                                 -->
  <!-- ============================================================ -->
  <div id="panel-izq">

    <div class="grupo">
      <h3>Conexion</h3>
      <div class="fila">
        <select id="sel-puerto"></select>
        <button id="btn-refrescar" style="width:auto;">Refrescar</button>
      </div>
      <button id="btn-conectar">Conectar</button>
    </div>

    <div class="grupo">
      <h3>Sistema a controlar</h3>
      <div class="radio-grupo">
        <label><input type="radio" name="modo" value="T" checked> Control de temperatura</label>
        <label><input type="radio" name="modo" value="V"> Control de velocidad</label>
      </div>
    </div>

    <div class="grupo">
      <h3>Referencia y ganancias PID</h3>
      <div class="fila">
        <label id="lbl-ref">Referencia:</label>
        <input type="number" id="inp-ref" step="0.5" value="32.5">
      </div>
      <div class="fila">
        <label>Kp:</label>
        <input type="number" id="inp-kp" step="0.001" value="18.0">
      </div>
      <div class="fila">
        <label>Ki:</label>
        <input type="number" id="inp-ki" step="0.001" value="1.5">
      </div>
      <div class="fila">
        <label>Kd:</label>
        <input type="number" id="inp-kd" step="0.001" value="0.5">
      </div>
      <div class="fila">
        <label>Ts (ms):</label>
        <input type="number" id="inp-ts" step="10" min="10" value="200">
      </div>
    </div>

    <div class="grupo">
      <h3>Valores actuales</h3>
      <div class="fila"><label>Medido:</label> <span id="lbl-medido" class="valor">-</span></div>
      <div class="fila"><label>PWM:</label>    <span id="lbl-pwm"    class="valor">-</span></div>
      <div class="fila"><label>Error:</label>  <span id="lbl-error"  class="valor">-</span></div>
    </div>

    <div class="grupo">
      <h3>Acciones</h3>
      <button id="btn-iniciar" class="btn-iniciar" disabled>Iniciar</button>
      <button id="btn-detener" disabled>Detener</button>
      <button id="btn-emergencia" class="btn-emergencia">Parada de emergencia</button>
      <button id="btn-reset">Reset</button>
      <button id="btn-export">Exportar datos a CSV</button>
    </div>

  </div>

  <!-- ============================================================ -->
  <!--   Panel derecho: cuatro graficas                             -->
  <!-- ============================================================ -->
  <div id="graficas">
    <div class="panel-grafica"><h4 id="titulo-medida">Temperatura medida vs referencia</h4><div class="canvas-wrap"><canvas id="g-medida"></canvas></div></div>
    <div class="panel-grafica"><h4>Ciclo de trabajo PWM aplicado</h4><div class="canvas-wrap"><canvas id="g-duty"></canvas></div></div>
    <div class="panel-grafica"><h4>Error de seguimiento</h4><div class="canvas-wrap"><canvas id="g-error"></canvas></div></div>
    <div class="panel-grafica"><h4>Componentes del PID</h4><div class="canvas-wrap"><canvas id="g-pid"></canvas></div></div>
  </div>

  <!-- ============================================================ -->
  <!--   Barra de estado                                            -->
  <!-- ============================================================ -->
  <div id="estado-bar">
    <span id="lbl-conexion">Desconectado</span>
    <span id="lbl-rate">Ts efectivo: -</span>
  </div>

</div>

<script src="/app.js"></script>

</body>
</html>
